#
# Ubuntu 24.04.4 LTS – Autoinstall configuration
# Target: Python Software Engineer workstation
#
# Usage:
#   Place this file at the root of a seed ISO or HTTP server as
#   "autoinstall.yaml", then boot the Ubuntu 24.04.4 installer and
#   point it at the seed source:
#     - Subiquity reads it automatically from a mounted seed drive
#     - Or pass: ds=nocloud-net;s=http://<server>/ on the kernel cmdline
#
# IMPORTANT: Review every value marked  ← CHANGE  before deploying.
#

autoinstall:
  version: 1

  # ── Locale & Keyboard ────────────────────────────────────────────────────
  locale: en_US.UTF-8
  keyboard:
    layout: us
    variant: ""

  # ── Network (DHCP on first NIC – adjust for static) ──────────────────────
  network:
    version: 2
    ethernets:
      enp0s31f6:        # Dell Latitude 5490 ethernet; WiFi is wlp2s0 (configure post-install)
        dhcp4: true
        dhcp6: false

  # ── Storage (entire-disk LVM with swap) ──────────────────────────────────
  storage:
    layout:
      name: lvm
      sizing-policy: all   # use all available disk space

  # ── Identity ─────────────────────────────────────────────────────────────
  identity:
    hostname: latitude-5490
    username: caue
    password: "senhasegura" # change after install

  # ── SSH ──────────────────────────────────────────────────────────────────
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - "ssh-ed25519 AAAA... your-key-comment"   # ← CHANGE or remove

  # ── Packages ─────────────────────────────────────────────────────────────
  packages:
    # --- Core system tools ---
    - curl
    - wget
    - git
    - git-lfs
    - gnupg
    - ca-certificates
    - software-properties-common
    - apt-transport-https
    - unzip
    - zip
    - tar
    - rsync
    - htop
    - btop
    - ncdu
    - tree
    - jq
    - ripgrep
    - fd-find
    - fzf
    - tmux
    - zsh
    - build-essential
    - pkg-config
    - make
    - cmake

    # --- Python ecosystem ---
    - python3                   # 3.12 ships with 24.04
    - python3-pip
    - python3-venv
    - python3-dev
    - python3-tk                # Tkinter (matplotlib GUI backends)
    - pipx
    - python3-poetry            # dependency management

    # --- Data / science libs (system level) ---
    - libopenblas-dev
    - liblapack-dev
    - libblas-dev
    - libhdf5-dev
    - libffi-dev
    - libssl-dev
    - libsqlite3-dev
    - libpq-dev                 # PostgreSQL client headers

    # --- Containers (Docker CE installed via late-commands) ---
    - snapd

    # --- Databases (local dev) ---
    - postgresql-client
    - sqlite3
    - redis-tools

    # --- Network / API tools ---
    - httpie
    - netcat-openbsd
    - nmap
    - tcpdump
    - dnsutils

    # --- Editors / IDEs ---
    - vim
    - neovim

    # --- Fonts & rendering ---
    - fonts-firacode            # coding font with ligatures
    - fonts-noto
    - fonts-liberation

    # --- Desktop utilities ---
    - gnome-tweaks
    - dconf-editor
    - copyq                     # clipboard manager
    - flameshot                 # screenshots
    - peek                      # GIF recorder
    - vlc
    - gpg
    - seahorse                  # GNOME keyring GUI

    # --- Monitoring / profiling ---
    - sysstat
    - iotop
    - strace
    - ltrace
    - linux-tools-generic       # perf

  # ── Late Commands (run as root inside target after packages install) ──────
  late-commands:
    # ---- Oh My Zsh + set zsh as default shell ----
    - |
      curtin in-target -- su - caue -c \
        "sh -c \"\$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)\" --unattended"
    - curtin in-target -- chsh -s /usr/bin/zsh caue

    # ---- Docker CE (official repo) ----
    - |
      curtin in-target -- bash -c '
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu noble stable" \
          > /etc/apt/sources.list.d/docker.list
        apt-get update -q
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
      '
    - curtin in-target -- usermod -aG docker caue
    - curtin in-target -- systemctl enable docker
    - curtin in-target -- systemctl enable containerd

    # ---- Homebrew (Linuxbrew) + formulae ----
    - |
      curtin in-target -- su - caue -c \
        "NONINTERACTIVE=1 /bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\""
    - |
      curtin in-target -- su - caue -c '
        cat >> ~/.zshrc << "EOF"

      # Homebrew
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      export PATH="$(brew --prefix)/bin:$PATH"

      # nvm (via brew)
      export NVM_DIR="$HOME/.nvm"
      [ -s "$(brew --prefix)/opt/nvm/nvm.sh" ] && . "$(brew --prefix)/opt/nvm/nvm.sh"
      [ -s "$(brew --prefix)/opt/nvm/etc/bash_completion.d/nvm" ] && . "$(brew --prefix)/opt/nvm/etc/bash_completion.d/nvm"

      # pyenv (via brew)
      export PYENV_ROOT="$HOME/.pyenv"
      eval "$(pyenv init - zsh)"
      eval "$(pyenv virtualenv-init -)"
      export PATH="$(brew --prefix)/opt/libpq/bin:$PATH"
      EOF
      '
    - |
      curtin in-target -- su - caue -c '
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew tap gszhangwei/tools
        brew tap hashicorp/tap
        brew install gcc helm helm-docs helmfile k3d k9s kubernetes-cli kubectx \
          maven nvm openfortivpn pipx pyenv pyenv-virtualenv uv yarn terraform \
          gszhangwei/tools/openspdd
      '

    # ---- pipx global tools ----
    - curtin in-target -- pipx install black
    - curtin in-target -- pipx install ruff
    - curtin in-target -- pipx install mypy
    - curtin in-target -- pipx install pytest
    - curtin in-target -- pipx install pre-commit
    - curtin in-target -- pipx install cookiecutter
    - curtin in-target -- pipx install pgcli
    - curtin in-target -- pipx install ipython
    - curtin in-target -- su - caue -c 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)" && pipx install poetry'

    # ---- Snap applications ----
    - curtin in-target -- snap install dbeaver-ce
    - curtin in-target -- snap install libreoffice --channel=latest/candidate
    - curtin in-target -- snap install spotify
    - curtin in-target -- snap install chatgpt-desktop
    - curtin in-target -- snap install cheese
    - curtin in-target -- snap install kolourpaint

    # ---- Cursor (Anysphere apt repo) ----
    - |
      curtin in-target -- bash -c '
        install -m 0755 -d /usr/share/keyrings
        curl -fsSL https://downloads.cursor.com/aptrepo/gpg \
          | gpg --dearmor -o /usr/share/keyrings/anysphere.gpg
        cat > /etc/apt/sources.list.d/cursor.sources << EOF
      Types: deb
      URIs: https://downloads.cursor.com/aptrepo
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /usr/share/keyrings/anysphere.gpg
      EOF
        apt-get update -q
        apt-get install -y cursor
      '

    # ---- Cursor extensions ----
    - |
      curtin in-target -- su - caue -c '
        cursor --install-extension ms-python.python
        cursor --install-extension ms-python.vscode-pylance
        cursor --install-extension ms-python.debugpy
        cursor --install-extension ms-python.vscode-python-envs
        cursor --install-extension ms-azuretools.vscode-containers
        cursor --install-extension eamodio.gitlens
        cursor --install-extension dbaeumer.vscode-eslint
        cursor --install-extension tamasfe.even-better-toml
        cursor --install-extension github.vscode-github-actions
        cursor --install-extension vitest.explorer
        cursor --install-extension batisteo.vscode-django
        cursor --install-extension wholroyd.jinja
      '

    # ---- Git global defaults ----
    - |
      curtin in-target -- su - caue -c '
        git config --global core.editor "cursor --wait"
        git config --global pull.rebase true
        git config --global init.defaultBranch main
        git config --global lfs.enable true
      '

    # ---- Reduce swappiness (better for dev workloads) ----
    - curtin in-target -- bash -c 'echo "vm.swappiness=10" >> /etc/sysctl.d/99-swappiness.conf'

  # ── Updates ──────────────────────────────────────────────────────────────
  updates: security    # apply security patches during install

  # ── Reboot automatically when done ───────────────────────────────────────
  shutdown: reboot
